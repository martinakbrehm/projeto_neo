[pytest]
# Raiz do projeto para resolução de imports
testpaths = tests

# Marcadores customizados
markers =
    integracao: requer banco de dados real (use -m integracao)
    conectividade: requer VPN / túnel SSH / API ativos (use -m conectividade)
    lento: testes com esperas ou processamento pesado

# Opções padrão
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Timeout padrão por teste (requer pytest-timeout)
# timeout = 30
